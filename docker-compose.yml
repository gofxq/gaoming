services:
  postgres:
    image: postgres:16-alpine
    container_name: gaoming-postgres
    environment:
      POSTGRES_DB: gaoming
      POSTGRES_USER: gaoming
      POSTGRES_PASSWORD: gaoming
    ports:
      - "35432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaoming -d gaoming"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gaoming-redis
    ports:
      - "36379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  master-api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_PATH: ./services/master-api/cmd/server
    container_name: gaoming-master-api
    environment:
      MASTER_API_HTTP_ADDR: :8080
      MASTER_API_RUNTIME_BACKEND: pg_redis
      MASTER_API_POSTGRES_DSN: postgres://gaoming:gaoming@postgres:5432/gaoming?sslmode=disable
      MASTER_API_REDIS_ADDR: redis:6379
      MASTER_API_TENANT_CODE: default
      MASTER_API_TENANT_NAME: Default Tenant
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/master/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingest-gateway:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_PATH: ./services/ingest-gateway/cmd/server
    container_name: gaoming-ingest-gateway
    environment:
      INGEST_GATEWAY_HTTP_ADDR: :8090
      INGEST_GATEWAY_GRPC_ADDR: :8091
    ports:
      - "8090:8090"
      - "8091:8091"
    depends_on:
      master-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/ingest/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  core-worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_PATH: ./services/core-worker/cmd/worker
    container_name: gaoming-core-worker
    environment:
      CORE_WORKER_LOOP_INTERVAL_SEC: 15
    depends_on:
      master-api:
        condition: service_healthy
      ingest-gateway:
        condition: service_healthy

  probe-worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_PATH: ./services/probe-worker/cmd/worker
    container_name: gaoming-probe-worker
    environment:
      PROBE_TARGET_URL: http://master-api:8080/master/healthz
      PROBE_REPORT_URL: http://ingest-gateway:8090/ingest/api/v1/probes
      PROBE_REGION: local-docker
      PROBE_INTERVAL_SEC: 10
    depends_on:
      master-api:
        condition: service_healthy
      ingest-gateway:
        condition: service_healthy

  agent:
    profiles:
      - container-agent
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_PATH: ./agent/daemon/cmd/agent
    container_name: gaoming-agent
    environment:
      MASTER_API_URL: http://master-api:8080
      INGEST_GATEWAY_URL: http://ingest-gateway:8090
      INGEST_GATEWAY_GRPC_ADDR: ingest-gateway:8091
      AGENT_REGION: local-docker
      AGENT_ENV: docker
      AGENT_ROLE: node
      AGENT_LOOP_INTERVAL_SEC: 1
    depends_on:
      master-api:
        condition: service_healthy
      ingest-gateway:
        condition: service_healthy

volumes:
  postgres_data:
