name: build-agent

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/build-agent.yml"
      - "agent/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build agent archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build_tar() {
            goos="$1"
            goarch="$2"
            name="gaoming-agent_${goos}_${goarch}"
            out_dir="dist/${name}"
            mkdir -p "${out_dir}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "${out_dir}/gaoming-agent" \
              ./agent/daemon/cmd/agent
            tar -C "${out_dir}" -czf "dist/${name}.tar.gz" gaoming-agent
            rm -rf "${out_dir}"
          }

          build_zip() {
            goos="$1"
            goarch="$2"
            name="gaoming-agent_${goos}_${goarch}"
            out_dir="dist/${name}"
            mkdir -p "${out_dir}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "${out_dir}/gaoming-agent.exe" \
              ./agent/daemon/cmd/agent
            (cd "${out_dir}" && zip -q "../${name}.zip" "gaoming-agent.exe")
            rm -rf "${out_dir}"
          }

          build_tar linux amd64
          build_tar linux arm64
          build_tar darwin amd64
          build_tar darwin arm64
          build_zip windows amd64
          build_zip windows arm64

          sha256sum dist/gaoming-agent_* > dist/checksums.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaoming-agent-release-assets
          path: dist/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gaoming-agent_linux_amd64.tar.gz
            dist/gaoming-agent_linux_arm64.tar.gz
            dist/gaoming-agent_darwin_amd64.tar.gz
            dist/gaoming-agent_darwin_arm64.tar.gz
            dist/gaoming-agent_windows_amd64.zip
            dist/gaoming-agent_windows_arm64.zip
            dist/checksums.txt
          generate_release_notes: true
